name: Targets Mutable

on:
  workflow_dispatch:

jobs:
  remote-composite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: __FIXTURES_REPOSITORY__/composite-actions/parent@upstream-PR/fix-apply-workflow-exclusions-during-local-recursion

  remote-composite-duplicate:
    runs-on: ubuntu-latest
    steps:
      - uses: __FIXTURES_REPOSITORY__/composite-actions/parent@upstream-PR/fix-apply-workflow-exclusions-during-local-recursion

  remote-reusable:
    uses: __FIXTURES_REPOSITORY__/.github/workflows/reusable-mutable.yml@upstream-PR/fix-apply-workflow-exclusions-during-local-recursion

  local-reusable-workflow:
    uses: ./.github/workflows/targets-local-reusable-workflow-mutable-parent.yml
