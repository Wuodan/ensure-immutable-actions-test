name: Maintain Pull Request
description: Log or close a pull request identified by its PR branch and base branch.

inputs:
  github_token:
    description: GitHub token used by the GitHub CLI.
    required: true
  repository:
    description: Repository in owner/name format.
    required: true
  pr_branch:
    description: Branch name used by the pull request.
    required: true
  base_branch:
    description: Base branch name for the managed pull request.
    required: true
  close_comment:
    description: Comment posted when closing a stale pull request.
    required: false
    default: Closing stale pull request because the latest run no longer requires it.

runs:
  using: composite
  steps:
    - name: Maintain pull request
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        REPOSITORY: ${{ inputs.repository }}
        PR_BRANCH: ${{ inputs.pr_branch }}
        BASE_BRANCH: ${{ inputs.base_branch }}
        CLOSE_COMMENT: ${{ inputs.close_comment }}
      run: |
        set -euo pipefail

        pr_data="$(
          gh pr list \
            --repo "${REPOSITORY}" \
            --head "${PR_BRANCH}" \
            --base "${BASE_BRANCH}" \
            --state open \
            --json number,url \
            --jq 'if length == 0 then "" else "\(.[0].number)\t\(.[0].url)" end'
        )"

        if [[ -z "${pr_data}" ]]; then
          echo "No open pull request found for ${PR_BRANCH} -> ${BASE_BRANCH}."
          exit 0
        fi

        IFS=$'\t' read -r pr_number pr_url <<< "${pr_data}"

        echo "PR Number - ${pr_number}"
        echo "PR URL - ${pr_url}"

        gh pr close "${pr_number}" \
          --repo "${REPOSITORY}" \
          --delete-branch \
          --comment "${CLOSE_COMMENT}"
