name: Validate Immutable Refs

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ensure-immutable-actions against immutable refs
        uses: Wuodan/ensure-immutable-actions@development
        with:
          github-token: ${{ github.token }}
          workflows: targets-immutable.yml
          fail-on-mutable: false
