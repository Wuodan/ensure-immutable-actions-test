name: "CI: lint"

"on":
  workflow_call:
  workflow_dispatch:
    inputs:
      fix_mode:
        description: How to publish autofixes for this run
        required: false
        default: pull_request
        type: choice
        options:
          - none
          - pull_request
  pull_request:
    branches-ignore:
      - lint-autofix/**
  push:
    branches-ignore:
      - lint-autofix/**

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.ref }}${{
      github.event_name == 'workflow_dispatch' && '-manual-' || ''
    }}${{
      github.event_name == 'workflow_dispatch' && github.run_id || ''
    }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

env:
  # create PR with fixes on:
  # - push to default branch
  # - by choice on workflow_dispatch
  FIX_MODE: >-
    ${{
      (
        github.event_name == 'push' &&
        github.ref_name == github.event.repository.default_branch
      ) && 'pull_request' || (github.event.inputs.fix_mode || 'none')
    }}

jobs:
  lint:
    name: Run linters
    if: ${{ github.event_name != 'pull_request' || !startsWith(github.head_ref, 'lint-autofix/') }}
    # runs-on: ubuntu-latest
    runs-on: [self-hosted, linux]
    env:
      BRANCH_REPO: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
    steps:
      - name: Verify fix mode
        run: |
          set -euo pipefail
          if [[ "${FIX_MODE}" != 'none' && "${BRANCH_REPO}" != "${GITHUB_REPOSITORY}" ]]; then
            echo "FIX_MODE=${FIX_MODE} requires a branch in the current repository." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.PAT || github.token }}
          fetch-depth: 0
          persist-credentials: false

#      - name: Get user information
#        run: |
#          {
#            echo "MEGALINTER_UID=$(id -u)"
#            echo "MEGALINTER_GID=$(id -g)"
#            echo "MEGALINTER_USER=$(id -un)"
#          } >> "$GITHUB_ENV"

      # - name: MegaLinter
      #   id: ml
      #   continue-on-error: true
      #   uses: Wuodan/megalinter@beta
      #   env:
      #     VALIDATE_ALL_CODEBASE: true
      #     GITHUB_TOKEN: ${{ github.token }}
      #     APPLY_FIXES: ${{ env.FIX_MODE != 'none' && 'all' || 'none' }}
      #     APPLY_FIXES_EVENT: ${{ github.event_name }}
      #     APPLY_FIXES_MODE: pull_request
      #     # new non-root user test
      #     MEGALINTER_UID: ${{ env.MEGALINTER_UID }}
      #     MEGALINTER_GID: ${{ env.MEGALINTER_GID }}
      #     MEGALINTER_USER:  ${{ env.MEGALINTER_USER }}

      - name: Super-linter
        id: sl
        continue-on-error: true
        uses: super-linter/super-linter@v8.7.0 # x-release-please-version
        env:
          # To report GitHub Actions status checks
          GITHUB_TOKEN: ${{ github.token }}
          # FIX_* to enable autofixing
          FIX_ANSIBLE: true
          FIX_BIOME_FORMAT: true
          FIX_BIOME_LINT: true
          FIX_CLANG_FORMAT: true
          FIX_CSHARP: true
          FIX_CSS_PRETTIER: true
          FIX_CSS: true
          FIX_DOTNET_SLN_FORMAT_ANALYZERS: true
          FIX_DOTNET_SLN_FORMAT_STYLE: true
          FIX_DOTNET_SLN_FORMAT_WHITESPACE: true
          FIX_ENV: true
          FIX_GITHUB_ACTIONS_ZIZMOR: true
          FIX_GO_MODULES: true
          FIX_GO: true
          FIX_GOOGLE_JAVA_FORMAT: true
          FIX_GRAPHQL_PRETTIER: true
          FIX_GROOVY: true
          FIX_HTML_PRETTIER: true
          FIX_JAVASCRIPT_ES: true
          FIX_JAVASCRIPT_PRETTIER: true
          FIX_JSON_PRETTIER: true
          FIX_JSON: true
          FIX_JSONC: true
          FIX_JSONC_PRETTIER: true
          FIX_JSX_PRETTIER: true
          FIX_JSX: true
          FIX_KOTLIN: true
          FIX_MARKDOWN_PRETTIER: true
          FIX_MARKDOWN: true
          FIX_NATURAL_LANGUAGE: true
          FIX_POWERSHELL: true
          FIX_PROTOBUF: true
          FIX_PYTHON_BLACK: true
          FIX_PYTHON_ISORT: true
          FIX_PYTHON_RUFF: true
          FIX_PYTHON_RUFF_FORMAT: true
          FIX_RUBY: true
          FIX_RUST_2015: true
          FIX_RUST_2018: true
          FIX_RUST_2021: true
          FIX_RUST_2024: true
          FIX_RUST_CLIPPY: true
          FIX_SCALAFMT: true
          FIX_SHELL_SHFMT: true
          FIX_SNAKEMAKE_SNAKEFMT: true
          FIX_SPELL_CODESPELL: true
          FIX_SQLFLUFF: true
          FIX_TERRAFORM_FMT: true
          FIX_TSX: true
          FIX_TYPESCRIPT_ES: true
          FIX_TYPESCRIPT_PRETTIER: true
          FIX_VUE: true
          FIX_VUE_PRETTIER: true
          FIX_YAML_PRETTIER: true

      - name: Detect lint changes
        if: always()
        id: changes
        run: |
          set -euo pipefail

          # Avoid creating autofix PRs for workflow-file edits.
          git restore .github || true

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          fi

#      - name: Upload MegaLinter artifacts
#        if: success() || failure()
#        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
#        with:
#          name: MegaLinter reports
#          include-hidden-files: "true"
#          path: |
#            megalinter-reports
#            mega-linter.log

      - name: Create Pull Request with applied fixes
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        id: cpr
        if: >-
          always() &&
          steps.changes.outputs.has_changes == 'true' &&
          env.FIX_MODE == 'pull_request'
        with:
          token: ${{ secrets.PAT || github.token }}
          commit-message: "[MegaLinter] Apply linters automatic fixes"
          title: "[Lint-Autofix] Apply linters automatic fixes"
#          body-path: megalinter-reports/megalinter-report.md
          # Keep the branch name stable so repeated runs update the same PR.
          branch: lint-autofix/${{ github.ref_name }}
          delete-branch: true
          labels: bot

      - name: Log created lint PR
        if: >-
          always() &&
          steps.changes.outputs.has_changes == 'true' &&
          env.FIX_MODE == 'pull_request'
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          echo "PR Number - ${PR_NUMBER}"
          echo "PR URL - ${PR_URL}"

      - name: Close stale lint PR
        if: >-
          always() &&
          steps.changes.outputs.has_changes != 'true' &&
          env.FIX_MODE == 'pull_request'
        uses: ./.github/actions/close-pull-request
        with:
          github_token: ${{ github.token }}
          repository: ${{ github.repository }}
          pr_branch: lint-autofix/${{ github.ref_name }}
          base_branch: ${{ github.ref_name }}
          close_comment: Closing stale pull request because the latest lint run produced no fixes.

      - name: Fail if linting found issues
        if: >-
          always() &&
          steps.sl.outcome == 'failure'
        run: |
          echo "Linting found issues."
          exit 1
