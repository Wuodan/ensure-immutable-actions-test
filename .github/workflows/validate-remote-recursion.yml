name: Validate Remote Recursion

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ensure-immutable-actions against this repo's workflows
        uses: Wuodan/ensure-immutable-actions@main
        with:
          github-token: ${{ github.token }}
          workflows: validate-targets.yml
          fail-on-mutable: false
