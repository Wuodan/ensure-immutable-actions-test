name: Validate Refs

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Action repository to test'
        required: false
        default: 'joshjohanning/ensure-immutable-actions'
        type: string
      ref:
        description: 'Action ref to test (branch, tag, or SHA)'
        required: false
        default: 'main'
        type: string
      pr:
        description: 'PR number to test (overrides ref if set)'
        required: false
        type: string
      fixtures_repository:
        description: 'Fixtures repository to use for the companion workflows and actions'
        required: false
        default: 'Wuodan/ensure-immutable-actions-test-custom-actions'
        type: string
      skip_output_assertions:
        description: 'Skip hardcoded output assertions and only run the validation workflows'
        required: false
        default: false
        type: boolean

run-name: "Validate Refs: ${{ inputs.pr && format('PR #{0}', inputs.pr) || format('{0}@{1}', inputs.repository, inputs.ref) }}"

jobs:
  resolve-ref:
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.resolve.outputs.repository }}
      ref: ${{ steps.resolve.outputs.ref }}
      display: ${{ steps.resolve.outputs.display }}

    steps:
      - name: Resolve action ref
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ inputs.pr }}" ]]; then
            repository="$(gh pr view "${{ inputs.pr }}" --repo "${{ inputs.repository }}" --json headRepository -q .headRepository.nameWithOwner)"
            ref="$(gh pr view "${{ inputs.pr }}" --repo "${{ inputs.repository }}" --json headRefName -q .headRefName)"
            display="PR #${{ inputs.pr }} (${repository}@${ref})"
          else
            repository="${{ inputs.repository }}"
            ref="${{ inputs.ref }}"
            display="${repository}@${ref}"
          fi

          {
            echo "repository=$repository"
            echo "ref=$ref"
            echo "display=$display"
          } >> "$GITHUB_OUTPUT"

      - name: Write job summary
        shell: bash
        run: |
          {
            echo "## Validation Configuration"
            echo
            echo "| Setting | Value |"
            echo "|---|---|"
            echo "| Action repo | \`${{ steps.resolve.outputs.repository }}\` |"
            echo "| Action ref | \`${{ steps.resolve.outputs.ref }}\` |"
            if [[ -n "${{ inputs.pr }}" ]]; then
              echo "| PR | [#${{ inputs.pr }}](https://github.com/${{ inputs.repository }}/pull/${{ inputs.pr }}) |"
            fi
            echo "| Fixtures repo | \`${{ inputs.fixtures_repository }}\` |"
            echo "| Skip output assertions | \`${{ inputs.skip_output_assertions }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Render repository-specific fixtures
        id: fixtures
        env:
          FIXTURES_REPOSITORY: ${{ inputs.fixtures_repository }}
        shell: bash
        run: ./scripts/render-fixtures.sh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Prettier check
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run yamllint
        run: |
          python -m pip install --disable-pip-version-check yamllint
          yamllint .

  validate:
    name: validate (${{ matrix.scenario.name }})
    needs: resolve-ref
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - name: targets-mutable.yml
            workflows: targets-mutable.yml
            expected_file: testdata/expected/targets-mutable.json
            fail_on_mutable: false
            include_first_party: false
          - name: targets-immutable.yml
            workflows: targets-immutable.yml
            expected_file: testdata/expected/targets-immutable.json
            fail_on_mutable: false
            include_first_party: false
          - name: targets-unsupported.yml
            workflows: targets-unsupported.yml
            expected_file: testdata/expected/targets-unsupported.json
            fail_on_mutable: false
            include_first_party: false
          - name: targets-first-party.yml include-first-party
            workflows: targets-first-party.yml
            expected_file: testdata/expected/targets-first-party-include-first-party.json
            fail_on_mutable: false
            include_first_party: true
          - name: workflows glob selection
            workflows: targets-immut*.yml,targets-unsup*.yml
            expected_file: testdata/expected/workflows-glob-selection.json
            fail_on_mutable: false
            include_first_party: false
          - name: exclude-workflows selection
            exclude_workflows: validate-refs.yml,targets-mutable.yml,targets-unsup*.yml,targets-first-party.yml,targets-mixed-first-party.yml,targets-local-reusable-workflow-*.yml
            expected_file: testdata/expected/exclude-workflows-selection.json
            fail_on_mutable: false
            include_first_party: false
          - name: invalid workflows input
            workflows: '[].yml'
            expected_file: testdata/expected/invalid-workflows-input.json
            fail_on_mutable: false
            include_first_party: false
          - name: exclude all workflows
            exclude_workflows: validate-refs.yml,targets-*.yml
            expected_file: testdata/expected/exclude-all-workflows.json
            fail_on_mutable: false
            include_first_party: false
          - name: targets-mixed-first-party.yml include-first-party
            workflows: targets-mixed-first-party.yml
            expected_file: testdata/expected/targets-mixed-first-party-include-first-party.json
            fail_on_mutable: false
            include_first_party: true

    steps:
      - uses: actions/checkout@v4

      - name: Checkout action under test
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve-ref.outputs.repository }}
          ref: ${{ needs.resolve-ref.outputs.ref }}
          path: action

      - name: Render repository-specific fixtures
        id: fixtures
        env:
          FIXTURES_REPOSITORY: ${{ inputs.fixtures_repository }}
        shell: bash
        run: ./scripts/render-fixtures.sh

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ steps.fixtures.outputs.owner }}
          repositories: ${{ steps.fixtures.outputs.repo }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: action/package-lock.json

      - name: Build action under test
        working-directory: action
        run: |
          npm ci --ignore-scripts
          npm run package

      - name: Run ensure-immutable-actions
        id: scan
        uses: ./action
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          workflows: ${{ matrix.scenario.workflows }}
          exclude-workflows: ${{ matrix.scenario.exclude_workflows }}
          fail-on-mutable: ${{ matrix.scenario.fail_on_mutable }}
          include-first-party: ${{ matrix.scenario.include_first_party }}

      - name: Assert outputs
        if: ${{ !inputs.skip_output_assertions }}
        env:
          SCENARIO_NAME: ${{ matrix.scenario.name }}
          EXPECTED_FILE: ${{ matrix.scenario.expected_file }}
          ALL_PASSED: ${{ steps.scan.outputs['all-passed'] }}
          WORKFLOWS_CHECKED: ${{ steps.scan.outputs['workflows-checked'] }}
          MUTABLE_ACTIONS: ${{ steps.scan.outputs['mutable-actions'] }}
          IMMUTABLE_ACTIONS: ${{ steps.scan.outputs['immutable-actions'] }}
          UNSUPPORTED_ACTIONS: ${{ steps.scan.outputs['unsupported-actions'] }}
          FIRST_PARTY_ACTIONS: ${{ steps.scan.outputs['first-party-actions'] || '[]' }}
        shell: bash
        run: |
          set -euo pipefail
          # Sort array-valued outputs so ordering differences do not fail the comparison.
          MUTABLE_ACTIONS_SORTED="$(jq 'sort_by(.uses)' <<<"$MUTABLE_ACTIONS")"
          IMMUTABLE_ACTIONS_SORTED="$(jq 'sort_by(.uses)' <<<"$IMMUTABLE_ACTIONS")"
          UNSUPPORTED_ACTIONS_SORTED="$(jq 'sort_by(.uses)' <<<"$UNSUPPORTED_ACTIONS")"
          FIRST_PARTY_ACTIONS_SORTED="$(jq 'sort_by(.uses)' <<<"$FIRST_PARTY_ACTIONS")"

          cat <<EOF | jq -S . > actual.json
          {
            "all-passed": $ALL_PASSED,
            "workflows-checked": $WORKFLOWS_CHECKED,
            "mutable-actions": $MUTABLE_ACTIONS_SORTED,
            "immutable-actions": $IMMUTABLE_ACTIONS_SORTED,
            "unsupported-actions": $UNSUPPORTED_ACTIONS_SORTED,
            "first-party-actions": $FIRST_PARTY_ACTIONS_SORTED
          }
          EOF

          jq -S . "$EXPECTED_FILE" > expected.json

          diff -u expected.json actual.json

  validate-fail-on-mutable:
    needs: resolve-ref
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout action under test
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.resolve-ref.outputs.repository }}
          ref: ${{ needs.resolve-ref.outputs.ref }}
          path: action

      - name: Render repository-specific fixtures
        id: fixtures
        env:
          FIXTURES_REPOSITORY: ${{ inputs.fixtures_repository }}
        shell: bash
        run: ./scripts/render-fixtures.sh

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ steps.fixtures.outputs.owner }}
          repositories: ${{ steps.fixtures.outputs.repo }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: action/package-lock.json

      - name: Build action under test
        working-directory: action
        run: |
          npm ci --ignore-scripts
          npm run package

      - name: Run ensure-immutable-actions with fail-on-mutable enabled
        id: scan
        continue-on-error: true
        uses: ./action
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          workflows: targets-mutable.yml
          fail-on-mutable: true

      - name: Assert scan step failed
        if: ${{ !inputs.skip_output_assertions }}
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.scan.outcome }}" = "failure"
