name: Validate Refs

on:
  workflow_dispatch:

jobs:
  validate-mutable:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ensure-immutable-actions against mutable refs
        id: scan
        uses: Wuodan/ensure-immutable-actions@v2.1.1-pr.4
        with:
          github-token: ${{ github.token }}
          workflows: targets-mutable.yml
          fail-on-mutable: false

      - name: Assert mutable outputs
        env:
          ALL_PASSED: ${{ steps.scan.outputs['all-passed'] }}
          WORKFLOWS_CHECKED: ${{ steps.scan.outputs['workflows-checked'] }}
          MUTABLE_ACTIONS: ${{ steps.scan.outputs['mutable-actions'] }}
          IMMUTABLE_ACTIONS: ${{ steps.scan.outputs['immutable-actions'] }}
          UNSUPPORTED_ACTIONS: ${{ steps.scan.outputs['unsupported-actions'] }}
        shell: bash
        run: |
          set -euo pipefail
          cat > actual.json <<EOF
          {
            "all-passed": $ALL_PASSED,
            "workflows-checked": $WORKFLOWS_CHECKED,
            "mutable-actions": $MUTABLE_ACTIONS,
            "immutable-actions": $IMMUTABLE_ACTIONS,
            "unsupported-actions": $UNSUPPORTED_ACTIONS
          }
          EOF

          cat > expected.json <<'EOF'
          {
            "all-passed": false,
            "workflows-checked": [
              "targets-mutable.yml"
            ],
            "mutable-actions": [
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/.github/workflows/reusable.yml@main",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": ".github/workflows/reusable.yml",
                "ref": "main",
                "isFirstParty": false,
                "immutable": false,
                "releaseFound": false,
                "message": "No release found for this reference"
              },
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/composite-actions/parent@main",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": "composite-actions/parent",
                "ref": "main",
                "isFirstParty": false,
                "immutable": false,
                "releaseFound": false,
                "message": "No release found for this reference"
              },
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/composite-actions/parent/child@main",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": "composite-actions/parent/child",
                "ref": "main",
                "isFirstParty": false,
                "immutable": false,
                "releaseFound": false,
                "message": "No release found for this reference"
              }
            ],
            "immutable-actions": [
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/composite-actions/leaf@87788a8bfd15d2098b295b8193e16019bf2e45db",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": "composite-actions/leaf",
                "ref": "87788a8bfd15d2098b295b8193e16019bf2e45db",
                "isFirstParty": false,
                "immutable": true,
                "releaseFound": false,
                "message": "Pinned to full commit SHA"
              }
            ],
            "unsupported-actions": []
          }
          EOF

          diff -u <(jq -S . expected.json) <(jq -S . actual.json)

  validate-immutable:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ensure-immutable-actions against immutable refs
        id: scan
        uses: Wuodan/ensure-immutable-actions@v2.1.1-pr.4
        with:
          github-token: ${{ github.token }}
          workflows: targets-immutable.yml
          fail-on-mutable: false

      - name: Assert immutable outputs
        env:
          ALL_PASSED: ${{ steps.scan.outputs['all-passed'] }}
          WORKFLOWS_CHECKED: ${{ steps.scan.outputs['workflows-checked'] }}
          MUTABLE_ACTIONS: ${{ steps.scan.outputs['mutable-actions'] }}
          IMMUTABLE_ACTIONS: ${{ steps.scan.outputs['immutable-actions'] }}
          UNSUPPORTED_ACTIONS: ${{ steps.scan.outputs['unsupported-actions'] }}
        shell: bash
        run: |
          set -euo pipefail
          cat > actual.json <<EOF
          {
            "all-passed": $ALL_PASSED,
            "workflows-checked": $WORKFLOWS_CHECKED,
            "mutable-actions": $MUTABLE_ACTIONS,
            "immutable-actions": $IMMUTABLE_ACTIONS,
            "unsupported-actions": $UNSUPPORTED_ACTIONS
          }
          EOF

          cat > expected.json <<'EOF'
          {
            "all-passed": true,
            "workflows-checked": [
              "targets-immutable.yml"
            ],
            "mutable-actions": [],
            "immutable-actions": [
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/.github/workflows/reusable.yml@db88ac462544346b5880f6c04a69486f72ce7173",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": ".github/workflows/reusable.yml",
                "ref": "db88ac462544346b5880f6c04a69486f72ce7173",
                "isFirstParty": false,
                "immutable": true,
                "releaseFound": false,
                "message": "Pinned to full commit SHA"
              },
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/composite-actions/parent@db88ac462544346b5880f6c04a69486f72ce7173",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": "composite-actions/parent",
                "ref": "db88ac462544346b5880f6c04a69486f72ce7173",
                "isFirstParty": false,
                "immutable": true,
                "releaseFound": false,
                "message": "Pinned to full commit SHA"
              },
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/composite-actions/parent/child@db88ac462544346b5880f6c04a69486f72ce7173",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": "composite-actions/parent/child",
                "ref": "db88ac462544346b5880f6c04a69486f72ce7173",
                "isFirstParty": false,
                "immutable": true,
                "releaseFound": false,
                "message": "Pinned to full commit SHA"
              },
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/composite-actions/leaf@87788a8bfd15d2098b295b8193e16019bf2e45db",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": "composite-actions/leaf",
                "ref": "87788a8bfd15d2098b295b8193e16019bf2e45db",
                "isFirstParty": false,
                "immutable": true,
                "releaseFound": false,
                "message": "Pinned to full commit SHA"
              }
            ],
            "unsupported-actions": []
          }
          EOF

          diff -u <(jq -S . expected.json) <(jq -S . actual.json)

  validate-unsupported:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ensure-immutable-actions against unsupported refs
        id: scan
        uses: Wuodan/ensure-immutable-actions@v2.1.1-pr.4
        with:
          github-token: ${{ github.token }}
          workflows: targets-unsupported.yml
          fail-on-mutable: false

      - name: Assert unsupported outputs
        env:
          ALL_PASSED: ${{ steps.scan.outputs['all-passed'] }}
          WORKFLOWS_CHECKED: ${{ steps.scan.outputs['workflows-checked'] }}
          MUTABLE_ACTIONS: ${{ steps.scan.outputs['mutable-actions'] }}
          IMMUTABLE_ACTIONS: ${{ steps.scan.outputs['immutable-actions'] }}
          UNSUPPORTED_ACTIONS: ${{ steps.scan.outputs['unsupported-actions'] }}
        shell: bash
        run: |
          set -euo pipefail
          cat > actual.json <<EOF
          {
            "all-passed": $ALL_PASSED,
            "workflows-checked": $WORKFLOWS_CHECKED,
            "mutable-actions": $MUTABLE_ACTIONS,
            "immutable-actions": $IMMUTABLE_ACTIONS,
            "unsupported-actions": $UNSUPPORTED_ACTIONS
          }
          EOF

          cat > expected.json <<'EOF'
          {
            "all-passed": false,
            "workflows-checked": [
              "targets-unsupported.yml"
            ],
            "mutable-actions": [],
            "immutable-actions": [
              {
                "uses": "Wuodan/ensure-immutable-actions-test-custom-actions/composite-actions/docker-unsupported@64b6290f8d6f3adef61136543f43c6607d5b301e",
                "owner": "Wuodan",
                "repo": "ensure-immutable-actions-test-custom-actions",
                "actionPath": "composite-actions/docker-unsupported",
                "ref": "64b6290f8d6f3adef61136543f43c6607d5b301e",
                "isFirstParty": false,
                "immutable": true,
                "releaseFound": false,
                "message": "Pinned to full commit SHA"
              }
            ],
            "unsupported-actions": [
              {
                "uses": "docker://alpine:3.20",
                "supported": false,
                "unsupportedType": "protocol-reference",
                "message": "Unsupported reference type: protocol-based action"
              }
            ]
          }
          EOF

          diff -u <(jq -S . expected.json) <(jq -S . actual.json)
