name: Validate Refs

on:
  workflow_dispatch:
    inputs:
      repository:
        description: 'Action repository to test'
        required: false
        default: 'joshjohanning/ensure-immutable-actions'
        type: string
      ref:
        description: 'Action ref to test (branch, tag, or SHA)'
        required: false
        default: 'main'
        type: string
      pr:
        description: 'PR number to test (overrides ref if set)'
        required: false
        type: string
      fixtures_repository:
        description: 'Fixtures repository to use for the companion workflows and actions'
        required: false
        default: 'Wuodan/ensure-immutable-actions-test-custom-actions'
        type: string
      skip_output_assertions:
        description: 'Skip hardcoded output assertions and only run the validation workflows'
        required: false
        default: false
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - targets-mutable.yml
          - targets-immutable.yml
          - targets-unsupported.yml

    steps:
      - uses: actions/checkout@v4

      - name: Run ensure-immutable-actions
        id: scan
        uses: Wuodan/ensure-immutable-actions@v2.1.1-pr.6
        with:
          github-token: ${{ github.token }}
          workflows: ${{ matrix.target }}
          fail-on-mutable: false

      - name: Assert outputs
        env:
          TARGET: ${{ matrix.target }}
          ALL_PASSED: ${{ steps.scan.outputs['all-passed'] }}
          WORKFLOWS_CHECKED: ${{ steps.scan.outputs['workflows-checked'] }}
          MUTABLE_ACTIONS: ${{ steps.scan.outputs['mutable-actions'] }}
          IMMUTABLE_ACTIONS: ${{ steps.scan.outputs['immutable-actions'] }}
          UNSUPPORTED_ACTIONS: ${{ steps.scan.outputs['unsupported-actions'] }}
          FIRST_PARTY_ACTIONS: ${{ steps.scan.outputs['first-party-actions'] }}
        shell: bash
        run: |
          set -euo pipefail
          # Sort array-valued outputs so ordering differences do not fail the comparison.
          MUTABLE_ACTIONS_SORTED="$(jq 'sort_by(.uses)' <<<"$MUTABLE_ACTIONS")"
          IMMUTABLE_ACTIONS_SORTED="$(jq 'sort_by(.uses)' <<<"$IMMUTABLE_ACTIONS")"
          UNSUPPORTED_ACTIONS_SORTED="$(jq 'sort_by(.uses)' <<<"$UNSUPPORTED_ACTIONS")"
          FIRST_PARTY_ACTIONS_SORTED="$(jq 'sort_by(.uses)' <<<"$FIRST_PARTY_ACTIONS")"

          cat > actual.json <<EOF
          {
            "all-passed": $ALL_PASSED,
            "workflows-checked": $WORKFLOWS_CHECKED,
            "mutable-actions": $MUTABLE_ACTIONS_SORTED,
            "immutable-actions": $IMMUTABLE_ACTIONS_SORTED,
            "unsupported-actions": $UNSUPPORTED_ACTIONS_SORTED,
            "first-party-actions": $FIRST_PARTY_ACTIONS_SORTED
          }
          EOF

          jq . actual.json > actual.pretty.json
          mv actual.pretty.json actual.json

          EXPECTED_FILE=".github/expected/${TARGET%.yml}.json"
          cp "$EXPECTED_FILE" expected.json

          diff -u expected.json actual.json

  validate-fail-on-mutable:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run ensure-immutable-actions with fail-on-mutable enabled
        id: scan
        continue-on-error: true
        uses: Wuodan/ensure-immutable-actions@v2.1.1-pr.6
        with:
          github-token: ${{ github.token }}
          workflows: targets-mutable.yml
          fail-on-mutable: true

      - name: Assert scan step failed
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.scan.outcome }}" = "failure"
